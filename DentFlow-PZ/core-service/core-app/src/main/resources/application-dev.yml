# Profil dev - domyslne wartosci do lokalnego uruchamiania
# Aktywacja: mvn spring-boot:run -Dspring-boot.run.profiles=dev

spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/dentflow}
    username: ${DB_USERNAME:dentflow}
    password: ${DB_PASSWORD:dentflow}
  mail:
    host: smtp.sendgrid.net
    port: 587
    username: ${MAIL_USERNAME:apikey}
    password: ${MAIL_PASSWORD:}

jwt:
  secret: ${JWT_SECRET:dev-only-secret-key-replace-in-production-min-256bit}
