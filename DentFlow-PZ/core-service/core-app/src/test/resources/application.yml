spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        hbm2ddl:
          halt_on_error: false
  flyway:
    enabled: false
  mail:
    host: localhost
    port: 25
    username: test
    password: test
    properties:
      mail:
        smtp:
          auth: false
          starttls:
            enable: false

jwt:
  secret: test-secret-key-for-unit-tests-only-min-256-bits-long

supabase:
  url: https://fake.supabase.co
  service-key: fake-test-key

logging:
  level:
    org.hibernate.tool.schema: ERROR
    org.springframework.boot.autoconfigure.security: WARN
